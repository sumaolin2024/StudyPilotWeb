{% extends 'base.html' %}
{% block title %}首页 - StudyPilot Web{% endblock %}
{% block content %}
<div class="text-center py-5">
  <h1 class="display-5">欢迎来到 StudyPilot Web</h1>
  <p class="lead">基于 Flask 的大学生学管理平台，支持 AI 刷题与 CS 八股文背诵卡片。</p>
  <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
    <a class="btn btn-outline-primary btn-lg" href="{{ url_for('quiz') }}">开始刷题</a>
    <a class="btn btn-success btn-lg" href="{{ url_for('flashcard') }}">背诵卡片</a>
  </div>
</div>
<div class="row gy-4">
  <div class="col-md-6">
    <div class="card shadow-sm h-100">
      <div class="card-body text-center">
        <h5 class="card-title">AI 刷题</h5>
        <p class="card-text">输入课程名即可生成选择题、判断题、填空题，并实时评分。</p>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card shadow-sm h-100">
      <div class="card-body text-center">
        <h5 class="card-title">背诵卡片</h5>
        <p class="card-text">35张 CS 八股文卡片，覆盖6大领域，点击翻转查看解释与举例。</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
