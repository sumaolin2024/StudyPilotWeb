{% extends 'base.html' %}
{% block title %}StudyPilot – 智能学习助手{% endblock %}
{% block content %}

<!-- Hero 区域 -->
<section class="hero">
  <h1>智能学习，高效备考</h1>
  <p>基于 AI 的大学生学管理平台，支持智能刷题与 CS 八股文背诵卡片，让复习更专注。</p>
  <div class="btn-group">
    <a class="btn btn-primary btn-lg" href="{{ url_for('quiz') }}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="vertical-align:-2px;margin-right:6px;">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      开始刷题
    </a>
    <a class="btn btn-secondary btn-lg" href="{{ url_for('flashcard') }}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="vertical-align:-2px;margin-right:6px;">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      背诵卡片
    </a>
  </div>
</section>

<!-- 功能卡片 -->
<div class="row g-4">
  <div class="col-md-6">
    <div class="card feature-card">
      <div class="icon-box blue">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <h3 class="card-title">AI 智能刷题</h3>
      <p class="card-text">输入课程名即可生成选择题、判断题、填空题。内置 CS 八股文题库，覆盖算法、网络、数据库等核心领域。</p>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card feature-card">
      <div class="icon-box green">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <h3 class="card-title">八股文背诵卡片</h3>
      <p class="card-text">35 张 CS 面试卡片，覆盖算法、网络、操作系统等 6 大领域。点击翻转查看详细解释与代码示例。</p>
    </div>
  </div>
</div>

{% endblock %}
